{% extends "base.html" %}

{% block content %}
<h4>Config</h4>
<pre id="config">{{ config | tojson(indent=2) }}</pre>
<h4>State</h4>
<pre>{{ state | tojson(indent=2) }}</pre>
<script>
socket.on("ui.config.changed", (config) => {
  document.getElementById("config").innerHTML = JSON.stringify(config, null, 2);
});
</script>
{% endblock %}
